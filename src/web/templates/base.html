<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Свечи MOEX" }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 24px; background: #f5f6f8; }
    .container { max-width: 960px; margin: 0 auto; }
    .card { padding: 20px; background: #fff; border-radius: 12px; margin: 20px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display:block; margin-top: 10px; font-weight: 600; }
    input, select { width: 100%; padding: 8px; margin-top: 6px; }
    button { margin-top: 14px; padding: 10px 14px; cursor: pointer; }
    .hint { color: #555; }
    .table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .table th { background: #f5f6f8; padding: 12px 14px; text-align: right; font-weight: 600; color: #333; }
    .table th:first-child { text-align: left; }
    .table td { padding: 10px 14px; border-bottom: 1px solid #eee; text-align: right; }
    .table td:first-child { text-align: left; font-weight: 500; color: #444; }
    .table tbody tr:nth-child(even) { background: #fafbfc; }
    .table tbody tr:hover { background: #f0f4f8; }
    .chart-wrap { background: #fff; padding: 16px; border-radius: 12px; margin: 16px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .chart-wrap img { display: block; max-width: 100%; height: auto; border-radius: 8px; }
    a { color: #1a1a1a; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
